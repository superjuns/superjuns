<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>扑克牌凑数 · 双榜并行 | 实时排名卡片</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #eef2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Nunito', system-ui, -apple-system, 'Poppins', sans-serif;
            margin: 0;
            padding: 10px;
        }

        .game-container {
            background: #ffffff;
            border-radius: 40px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.04);
            padding: 16px 16px 22px;
            max-width: 880px;
            width: 100%;
            border: 1px solid #eef2f6;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 1.6rem;
            margin: 0 0 4px 0;
            color: #3b7c5e;
            font-weight: 600;
        }

        .sub {
            text-align: center;
            font-size: 0.7rem;
            color: #6c8b7c;
            background: #edf4f0;
            display: inline-block;
            width: 100%;
            padding: 4px;
            border-radius: 30px;
            margin-bottom: 14px;
        }

        /* 第一行：难度切换 + 答题按钮 */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .difficulty-switch {
            display: flex;
            gap: 8px;
            background: #f0f3f6;
            padding: 4px 10px;
            border-radius: 40px;
        }
        .difficulty-btn {
            background: #e8edf0;
            border: none;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 5px 14px;
            border-radius: 28px;
            cursor: pointer;
            color: #415a4e;
        }
        .difficulty-btn.active {
            background: #699e7c;
            color: white;
        }
        .quiz-mode-btn {
            background: #7caf7c;
            border: none;
            color: white;
            font-weight: 700;
            font-size: 0.85rem;
            padding: 6px 18px;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 1px 4px rgba(124,175,124,0.3);
            white-space: nowrap;
        }
        .quiz-mode-btn:active { transform: scale(0.96); }
        .quiz-mode-btn.disabled-btn {
            background: #a8bca8;
            box-shadow: none;
            cursor: not-allowed;
            opacity: 0.8;
        }

        /* 目标数字独立区域 - 位于换一组牌按钮上方 */
        .target-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 12px;
        }
        .target-number {
            background: #f2d9b0;
            border-radius: 60px;
            padding: 10px 32px;
            font-size: 2rem;
            font-weight: 800;
            color: #3f2e1c;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 10px;
        }
        .practice-skip-btn {
            background: #bda27e;
            border: none;
            color: white;
            font-weight: 600;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.85rem;
            width: 100%;
            max-width: 200px;
        }

        .quiz-panel {
            display: flex;
            gap: 10px;
            align-items: center;
            background: #f9fbfd;
            padding: 4px 12px;
            border-radius: 40px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 8px;
        }
        .quiz-timer, .quiz-progress {
            background: #eef2f0;
            color: #2d4f3e;
            padding: 4px 12px;
            border-radius: 28px;
            font-family: monospace;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .skip-btn {
            background: #c9aa7b;
            border: none;
            color: white;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 28px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .cards-area {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin: 12px 0 10px;
        }
        .card {
            width: min(72px, 19vw);
            height: min(96px, 26vw);
            background: #fffef7;
            border-radius: 16px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: #c7573a;
            cursor: pointer;
            border: 1px solid #f1e4cf;
            transition: 0.05s;
        }
        .card.disabled-card {
            opacity: 0.45;
            filter: grayscale(0.2);
            cursor: default;
            background: #e8e5db;
        }
        .card-number {
            font-size: 1.8rem;
            font-weight: 800;
        }
        .card-suit {
            font-size: 1.3rem;
            margin-top: 2px;
        }

        .operator-circles {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 8px 0 12px;
            flex-wrap: wrap;
        }
        .op-circle {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #f2efe2;
            border: 2px solid #d2dfca;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.08s linear;
            color: #4a6b56;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }
        .op-circle.active {
            background: #699e7c;
            border-color: #699e7c;
            color: white;
            transform: scale(0.96);
            box-shadow: 0 2px 6px rgba(105,158,124,0.3);
        }
        .op-circle:active { transform: scale(0.94); }
        .op-pair {
            display: flex;
            gap: 16px;
        }

        .equation-area {
            background: #fefcf5;
            border-radius: 36px;
            padding: 12px 10px;
            margin-bottom: 12px;
        }
        .slots-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
        }
        .slot {
            background: #fef8ec;
            width: min(72px, 19vw);
            height: min(96px, 26vw);
            border-radius: 18px;
            border: 2px dashed #cdd9cc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
        }
        .slot.filled {
            background: #fff6e6;
            border: 2px solid #bdd3b0;
        }
        .slot-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #4c6a57;
        }
        .operator-placeholder {
            width: min(52px, 14vw);
            height: min(52px, 14vw);
            border-radius: 50%;
            background: #f9f5ea;
            border: 2px dotted #cdd9cc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: bold;
            color: #699e7c;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            margin: 8px 0 10px;
        }
        .check-btn {
            background: #8fb792;
            color: white;
            border: none;
            font-size: 1rem;
            padding: 10px 24px;
            border-radius: 48px;
            font-weight: 600;
            cursor: pointer;
            width: 80%;
            max-width: 220px;
        }
        .check-btn:active { transform: scale(0.97); }

        .message-area {
            text-align: center;
            margin-top: 10px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #5c7c66;
            background: #f5f8f2;
            padding: 5px 12px;
            border-radius: 40px;
        }
        
        /* 实时排名卡片 */
        .live-rank-card {
            background: #eef6f0;
            border-radius: 28px;
            padding: 12px 14px;
            margin: 8px 0 12px;
            border-left: 5px solid #699e7c;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }
        .live-rank-title {
            font-weight: 700;
            font-size: 0.8rem;
            color: #2c6e4f;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .live-rank-content {
            font-size: 0.85rem;
            font-weight: 500;
            color: #3a5a4a;
            line-height: 1.4;
        }
        .live-rank-content span {
            font-weight: 800;
            color: #d97747;
        }
        .live-rank-note {
            font-size: 0.65rem;
            color: #8aa89a;
            margin-top: 6px;
        }
        
        footer {
            text-align: center;
            margin-top: 12px;
            color: #b9c6bc;
            font-size: 0.65rem;
        }
        .hide { display: none !important; }

        /* 三列布局：困难榜、简单榜、实时排名卡片 */
        .leaderboard-row {
            display: flex;
            gap: 16px;
            margin-top: 14px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .leaderboard-col {
            flex: 1;
            background: #fefcf5;
            border-radius: 28px;
            border: 1px solid #e8efea;
            overflow: hidden;
            min-width: 170px;
        }
        .live-rank-col {
            flex: 1;
            min-width: 170px;
        }
        .leaderboard-header {
            padding: 10px 12px 6px;
            background: #fafbf8;
            border-bottom: 1px solid #e8efea;
            text-align: center;
        }
        .leaderboard-header h3 {
            font-size: 0.9rem;
            font-weight: 700;
            color: #2c6e4f;
            margin: 0;
        }
        .leaderboard-list {
            padding: 6px 6px 10px;
            max-height: 260px;
            overflow-y: auto;
        }
        .rank-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #ffffff;
            margin: 4px 4px;
            padding: 5px 10px;
            border-radius: 40px;
            border: 1px solid #eef3ef;
        }
        .rank-left { display: flex; gap: 8px; flex-wrap: wrap; flex: 2; align-items: center; }
        .rank-num { font-weight: 800; font-size: 0.9rem; min-width: 32px; color: #c9aa6b; }
        .rank-num.gold { color: #f5b042; }
        .rank-num.silver { color: #9bb7d4; }
        .rank-num.bronze { color: #cd7f56; }
        .rank-name { font-weight: 700; font-size: 0.75rem; color: #2c5a4a; }
        .rank-class { background: #eef3ef; padding: 1px 8px; border-radius: 24px; font-size: 0.6rem; }
        .rank-stats { display: flex; gap: 8px; }
        .rank-correct { background: #dcfce7; padding: 2px 8px; border-radius: 24px; font-weight: 700; font-size: 0.7rem; }
        .rank-time { font-family: monospace; font-weight: 600; font-size: 0.7rem; color: #d97747; }
        .empty-rank { text-align: center; padding: 20px; font-size: 0.75rem; color: #9fb7ab; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; visibility: hidden; opacity: 0;
            transition: 0.2s;
        }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .modal-container {
            background: white; border-radius: 40px; width: 85%; max-width: 320px;
            padding: 20px 18px 24px; text-align: center;
        }
        .modal-container h3 { font-size: 1.3rem; color: #3b7c5e; margin-bottom: 12px; }
        .modal-input-group { margin-bottom: 14px; text-align: left; }
        .modal-input-group label { font-weight: 600; font-size: 0.8rem; color: #2d5a46; display: block; margin-bottom: 4px; }
        .modal-input-group select, .modal-input-group input {
            width: 100%; padding: 8px 12px; border-radius: 32px;
            border: 1px solid #cedfd6; font-size: 0.85rem;
        }
        .modal-buttons { display: flex; gap: 10px; margin-top: 6px; }
        .modal-btn { flex: 1; padding: 8px; border-radius: 32px; font-weight: bold; border: none; cursor: pointer; }
        .modal-btn.confirm { background: #7caf7c; color: white; }
        .modal-btn.cancel { background: #e2e8f0; color: #4a5b52; }

        @media (max-width: 750px) {
            .leaderboard-row { flex-direction: column; gap: 12px; }
            .card, .slot { width: min(65px, 18vw); height: min(85px, 24vw); }
            .card-number, .slot-value { font-size: 1.5rem; }
            .operator-placeholder { width: min(45px, 12vw); height: min(45px, 12vw); font-size: 1.3rem; }
            .op-circle { width: 48px; height: 48px; font-size: 1.5rem; }
            .check-btn { padding: 8px 20px; font-size: 0.9rem; }
            .target-number { font-size: 1.6rem; padding: 8px 24px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <h1>🃏 凑数挑战</h1>
    <div class="sub">👆 点击扑克牌自动填入第一个空位 | 点击算式数字移除</div>

    <!-- 第一行：左侧难度切换，右侧答题模式按钮 -->
    <div class="top-bar">
        <div class="difficulty-switch">
            <button class="difficulty-btn" data-diff="easy">✨简单</button>
            <button class="difficulty-btn" data-diff="hard">🔥困难</button>
        </div>
        <button class="quiz-mode-btn" id="quizModeBtn">🏆 答题模式</button>
    </div>

    <!-- 目标数字独立区域，位于换一组牌按钮上方 -->
    <div class="target-section">
        <div class="target-number">🎯 目标 <span id="targetNum">14</span></div>
        <button class="practice-skip-btn" id="practiceSkipBtn">🔄 换一组牌</button>
    </div>

    <!-- 答题模式专用面板（答题时显示计时和进度） -->
    <div class="quiz-panel" id="quizPanel">
        <span class="quiz-timer" id="timerDisplay">0 s</span>
        <span class="quiz-progress" id="progressDisplay">✅ 0/5</span>
        <button class="skip-btn" id="skipBtn">⏩跳过</button>
    </div>

    <div class="cards-area" id="cardsArea"></div>

    <div id="operatorCircles" class="operator-circles"></div>

    <div class="equation-area" id="equationArea"></div>

    <div class="action-buttons">
        <button class="check-btn" id="submitBtn">✔ 验证算式 ✔</button>
    </div>
    <div class="message-area" id="messageBox">💡 点击扑克牌自动填入第一个空位，点击算式中的数字可移除</div>

    <!-- 三列布局：困难榜、简单榜、实时排名卡片 -->
    <div class="leaderboard-row">
        <div class="leaderboard-col">
            <div class="leaderboard-header"><h3>🔥 困难模式排行榜</h3></div>
            <div id="hardLeaderboard" class="leaderboard-list"><div class="empty-rank">加载中...</div></div>
        </div>
        <div class="leaderboard-col">
            <div class="leaderboard-header"><h3>✨ 简单模式排行榜</h3></div>
            <div id="easyLeaderboard" class="leaderboard-list"><div class="empty-rank">加载中...</div></div>
        </div>
        <div class="live-rank-col">
            <div id="liveRankCard" class="live-rank-card">
                <div class="live-rank-title">📊 玩家实时排名</div>
                <div class="live-rank-content" id="liveRankContent">未登录或暂无成绩</div>
                <div class="live-rank-note">⭐ 完成答题挑战后自动更新排名</div>
            </div>
        </div>
    </div>
    <footer>➖ 减法结果非负 | 答题模式共5题，正确/错误/跳过均计为完成一题 | 完成后显示实时排名</footer>
</div>

<div id="infoModal" class="modal-overlay">
    <div class="modal-container">
        <h3>🏫 选手信息</h3>
        <div class="modal-input-group"><label>班级</label><select id="studentClass"><option value="1">1班</option><option value="2">2班</option><option value="3">3班</option><option value="4">4班</option><option value="5">5班</option><option value="6">6班</option></select></div>
        <div class="modal-input-group"><label>姓名</label><input type="text" id="studentName" placeholder="请输入姓名" maxlength="20"></div>
        <div class="modal-buttons"><button class="modal-btn cancel" id="modalCancelBtn">取消</button><button class="modal-btn confirm" id="modalConfirmBtn">开始</button></div>
    </div>
</div>

<script>
    // DOM 元素
    const targetSpan = document.getElementById('targetNum');
    const cardsArea = document.getElementById('cardsArea');
    const equationArea = document.getElementById('equationArea');
    const timerDisplay = document.getElementById('timerDisplay');
    const progressDisplay = document.getElementById('progressDisplay');
    const submitBtn = document.getElementById('submitBtn');
    const messageBox = document.getElementById('messageBox');
    const quizPanel = document.getElementById('quizPanel');
    const skipBtn = document.getElementById('skipBtn');
    const practiceSkipBtn = document.getElementById('practiceSkipBtn');
    const quizModeBtn = document.getElementById('quizModeBtn');
    const easyLeaderboardDiv = document.getElementById('easyLeaderboard');
    const hardLeaderboardDiv = document.getElementById('hardLeaderboard');
    const liveRankContent = document.getElementById('liveRankContent');

    const modalOverlay = document.getElementById('infoModal');
    const studentClassSelect = document.getElementById('studentClass');
    const studentNameInput = document.getElementById('studentName');
    const modalConfirmBtn = document.getElementById('modalConfirmBtn');
    const modalCancelBtn = document.getElementById('modalCancelBtn');
    const operatorCirclesDiv = document.getElementById('operatorCircles');

    // 核心状态
    let currentDifficulty = 'easy';
    let targetNumber = 14;
    let currentCards = [];
    let cardDataList = [];
    let slotsData = [];
    let operators = [];

    let isQuizActive = false;
    let correctCount = 0, totalCompleted = 0;
    const TOTAL_QUIZ = 5;
    let startTime = 0, timerInterval = null;
    let currentStudent = { class: '', name: '' };
    let leaderboardTimer = null;

    const API_ALL_URL = "https://quickform.cn/api/qo3ux2czpi/all";
    const API_POST_URL = "https://quickform.cn/api/qo3ux2czpi";

    // 获取当前用户的排名
    async function updateLiveRank() {
        if (!currentStudent.name || !currentStudent.class) {
            liveRankContent.innerHTML = '未登录或暂无成绩<br>请点击「答题模式」开始挑战';
            return;
        }
        try {
            const res = await fetch(API_ALL_URL);
            if (!res.ok) throw new Error();
            const json = await res.json();
            const submissions = json.submissions || (Array.isArray(json) ? json : []);
            
            const records = [];
            for (let item of submissions) {
                let correct = item.correctCount ?? item.correct ?? 0;
                let seconds = item.timeSeconds ?? item.time ?? 0;
                let diff = item.difficulty || 'easy';
                let name = item.name || item.studentName || '';
                let cls = item.class || item.className || '';
                if (diff === currentDifficulty && name && cls) {
                    records.push({ correct, seconds, name, class: cls });
                }
            }
            if (records.length === 0) {
                liveRankContent.innerHTML = `📭 暂无${currentDifficulty==='easy'?'简单':'困难'}模式数据<br>完成挑战后显示排名`;
                return;
            }
            records.sort((a,b) => {
                if (a.correct !== b.correct) return b.correct - a.correct;
                return a.seconds - b.seconds;
            });
            let rank = -1;
            let userRecord = null;
            for (let i = 0; i < records.length; i++) {
                if (records[i].name === currentStudent.name && records[i].class === currentStudent.class) {
                    rank = i + 1;
                    userRecord = records[i];
                    break;
                }
            }
            if (rank === -1 || !userRecord) {
                liveRankContent.innerHTML = `👤 ${escapeHtml(currentStudent.name)} (${escapeHtml(currentStudent.class)})<br>🏆 暂无成绩，完成5题挑战后上榜`;
                return;
            }
            const total = records.length;
            const rankText = rank === 1 ? '🥇 第1名' : (rank === 2 ? '🥈 第2名' : (rank === 3 ? '🥉 第3名' : `第 ${rank} 名`));
            liveRankContent.innerHTML = `
                👤 ${escapeHtml(currentStudent.name)} (${escapeHtml(currentStudent.class)})<br>
                🎯 ${currentDifficulty==='easy'?'简单模式':'困难模式'} 最佳成绩：✅ ${userRecord.correct}/5 题，⏱️ ${userRecord.seconds} 秒<br>
                🏆 当前排名：${rankText} (共 ${total} 人)
            `;
        } catch(e) {
            liveRankContent.innerHTML = '⚠️ 排名加载失败，请稍后';
        }
    }

    async function fetchBothLeaderboards() {
        try {
            const res = await fetch(API_ALL_URL);
            if (!res.ok) throw new Error();
            const json = await res.json();
            const submissions = json.submissions || (Array.isArray(json) ? json : []);
            
            const easyRecords = [];
            const hardRecords = [];
            
            for (let item of submissions) {
                let correct = item.correctCount ?? item.correct ?? 0;
                let seconds = item.timeSeconds ?? item.time ?? 0;
                let className = item.class || item.className || '';
                let studentName = item.name || item.studentName || '';
                let diff = item.difficulty || 'easy';
                if (className && studentName && correct !== undefined) {
                    const record = { correct, seconds, className: String(className), studentName: String(studentName) };
                    if (diff === 'easy') easyRecords.push(record);
                    else if (diff === 'hard') hardRecords.push(record);
                }
            }
            
            easyRecords.sort((a,b) => a.correct !== b.correct ? b.correct - a.correct : a.seconds - b.seconds);
            hardRecords.sort((a,b) => a.correct !== b.correct ? b.correct - a.correct : a.seconds - b.seconds);
            const topEasy = easyRecords.slice(0,5);
            const topHard = hardRecords.slice(0,5);
            
            if (!topEasy.length) {
                easyLeaderboardDiv.innerHTML = '<div class="empty-rank">📭 暂无数据</div>';
            } else {
                let html = '';
                topEasy.forEach((item, idx) => {
                    let medal = idx===0?'🥇':(idx===1?'🥈':(idx===2?'🥉':`${idx+1}`));
                    let rankClass = idx===0?'gold':(idx===1?'silver':(idx===2?'bronze':''));
                    html += `<div class="rank-item"><div class="rank-left"><div class="rank-num ${rankClass}">${medal}</div><div class="rank-name">${escapeHtml(item.studentName)}</div><div class="rank-class">${escapeHtml(item.className)}</div></div><div class="rank-stats"><span class="rank-correct">✅ ${item.correct}/5</span><span class="rank-time">⏱️ ${item.seconds}秒</span></div></div>`;
                });
                easyLeaderboardDiv.innerHTML = html;
            }
            
            if (!topHard.length) {
                hardLeaderboardDiv.innerHTML = '<div class="empty-rank">📭 暂无数据</div>';
            } else {
                let html = '';
                topHard.forEach((item, idx) => {
                    let medal = idx===0?'🥇':(idx===1?'🥈':(idx===2?'🥉':`${idx+1}`));
                    let rankClass = idx===0?'gold':(idx===1?'silver':(idx===2?'bronze':''));
                    html += `<div class="rank-item"><div class="rank-left"><div class="rank-num ${rankClass}">${medal}</div><div class="rank-name">${escapeHtml(item.studentName)}</div><div class="rank-class">${escapeHtml(item.className)}</div></div><div class="rank-stats"><span class="rank-correct">✅ ${item.correct}/5</span><span class="rank-time">⏱️ ${item.seconds}秒</span></div></div>`;
                });
                hardLeaderboardDiv.innerHTML = html;
            }
            
            await updateLiveRank();
        } catch(e) {
            easyLeaderboardDiv.innerHTML = '<div class="empty-rank">⚠️ 加载失败</div>';
            hardLeaderboardDiv.innerHTML = '<div class="empty-rank">⚠️ 加载失败</div>';
        }
    }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, (m)=>({ '&':'&amp;','<':'&lt;','>':'&gt;' }[m])); }
    function startLeaderboardRefresh() { if(leaderboardTimer) clearInterval(leaderboardTimer); fetchBothLeaderboards(); leaderboardTimer = setInterval(fetchBothLeaderboards, 30000); }

    function showMessage(msg, isError=false) { messageBox.innerHTML = msg; messageBox.style.color = isError ? '#c75c3e' : '#538e6e'; setTimeout(()=>{ if(messageBox.innerHTML===msg) messageBox.style.color='#5c7c66'; },2000); }
    function stopTimer() { if(timerInterval) clearInterval(timerInterval); timerInterval=null; }
    function startTimer() { stopTimer(); startTime=Date.now(); timerInterval=setInterval(()=>{ if(isQuizActive) timerDisplay.textContent = Math.floor((Date.now()-startTime)/1000)+' s'; },200); }
    function updateQuizUI() { progressDisplay.innerHTML = `✅ ${correctCount} / ${TOTAL_QUIZ}`; }

    async function sendGameData(correct, total, seconds, difficulty, completed, className, studentName) {
        if(!completed) return;
        try {
            await fetch(API_POST_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ event:"quiz_completed", correctCount:correct, totalQuestions:total, timeSeconds:seconds, difficulty, class:className, name:studentName, timestamp:new Date().toISOString(), game:"poker_math_20" }) });
            showMessage(`✅ ${studentName} 成绩已提交！`, false);
            await fetchBothLeaderboards();
            await updateLiveRank();
        } catch(e) { showMessage('网络问题，成绩未提交', true); }
    }

    function finishQuiz(completed=true) {
        if(!isQuizActive) return;
        const elapsed = Math.floor((Date.now()-startTime)/1000);
        const full = completed && totalCompleted >= TOTAL_QUIZ;
        isQuizActive=false; stopTimer();
        if(full) {
            showMessage(`🏆 答题完成！ ${currentStudent.name} (${currentStudent.class}) 答对 ${correctCount} 题，用时 ${elapsed} 秒`);
            sendGameData(correctCount, TOTAL_QUIZ, elapsed, currentDifficulty, true, currentStudent.class, currentStudent.name);
        }
        correctCount=0; totalCompleted=0; updateQuizUI(); timerDisplay.textContent='0 s';
        quizPanel.classList.add('hide'); 
        quizModeBtn.classList.remove('disabled-btn'); quizModeBtn.disabled=false; quizModeBtn.textContent='🏆 答题模式';
        refreshGame(true);
        if(!full) showMessage('练习模式');
    }

    function clearAllSlots() {
        const len = currentDifficulty==='easy'?2:3;
        slotsData = Array(len).fill(null);
        if(cardDataList.length) cardDataList.forEach(c=>c.used=false);
        renderCards();
        renderEquationArea();
    }
    function resetOperators() {
        operators = currentDifficulty==='easy' ? [null] : [null, null];
        renderOperatorCircles();
        renderEquationArea();
    }

    function hasValidSolution(diff, target, cards) {
        if(diff==='easy') {
            for(let i=0;i<cards.length;i++) for(let j=i+1;j<cards.length;j++) {
                let a=cards[i],b=cards[j];
                if(a+b===target) return true;
                if(a-b===target && a-b>=0) return true;
                if(b-a===target && b-a>=0) return true;
            } return false;
        } else {
            for(let i=0;i<4;i++) for(let j=0;j<4;j++) if(j!==i) for(let k=0;k<4;k++) if(k!==i && k!==j) {
                let a=cards[i],b=cards[j],c=cards[k];
                for(let op of [['+','+'],['+','-'],['-','+'],['-','-']]) {
                    let s1 = op[0]==='+'? a+b : a-b; if(s1<0) continue;
                    let s2 = op[1]==='+'? s1+c : s1-c; if(s2===target && s2>=0) return true;
                }
            } return false;
        }
    }

    function generateValidGame() {
        for(let att=0;att<45;att++) {
            let newTarget = Math.floor(Math.random()*20)+1;
            let newCards = Array.from({length:4},()=>Math.floor(Math.random()*13)+1);
            if(hasValidSolution(currentDifficulty, newTarget, newCards)) {
                targetNumber=newTarget; currentCards=[...newCards];
                targetSpan.innerText=targetNumber;
                cardDataList = currentCards.map((val,idx)=>({ id:`c_${Date.now()}_${idx}_${Math.random()}`, value:val, used:false }));
                return;
            }
        }
        targetNumber = currentDifficulty==='easy'?10:12;
        currentCards = currentDifficulty==='easy'?[4,6,2,9]:[5,7,3,4];
        targetSpan.innerText=targetNumber;
        cardDataList = currentCards.map((val,idx)=>({ id:`c_back_${idx}`, value:val, used:false }));
    }

    function refreshGame(keepClear=true) { 
        generateValidGame(); 
        if(keepClear) { 
            clearAllSlots(); 
            resetOperators(); 
        } 
        renderCards(); 
        renderEquationArea(); 
    }

    function quizCompleteOne(isCorrect=true) {
        if(!isQuizActive || totalCompleted>=TOTAL_QUIZ) return;
        if(isCorrect) correctCount++;
        totalCompleted++;
        updateQuizUI();
        if(totalCompleted===TOTAL_QUIZ) { finishQuiz(true); return; }
        refreshGame(true);
        showMessage(isCorrect ? `🎉 正确！ (${totalCompleted}/${TOTAL_QUIZ})` : `❌ 错误！ (${totalCompleted}/${TOTAL_QUIZ})`, !isCorrect);
    }

    function computeCurrentExpression() {
        const values = slotsData.map(s=>s?.value);
        if(values.includes(undefined)) return null;
        if(currentDifficulty==='easy') {
            if(operators[0] === null) { showMessage('请先选择运算符', true); return null; }
            let a=values[0], b=values[1];
            if(operators[0]==='+') return a+b;
            let diff=a-b; if(diff<0){ showMessage('减法结果不能为负数',true); return null; } return diff;
        } else {
            if(operators[0]===null || operators[1]===null) { showMessage('请先选择两个运算符', true); return null; }
            let step=values[0];
            for(let i=0;i<operators.length;i++) {
                let nxt=values[i+1];
                if(operators[i]==='+') step+=nxt; else step-=nxt;
                if(step<0){ showMessage('运算过程出现负数',true); return null; }
            } return step;
        }
    }

    function validateSlotsFilled() {
        let need = currentDifficulty==='easy'?2:3;
        let filled = slotsData.filter(s=>s!==null).length;
        if(filled!==need){ showMessage(`请放置 ${need} 张扑克牌`,true); return false; }
        return true;
    }

    function handleVerify() {
        if(!validateSlotsFilled()) return;
        let res = computeCurrentExpression(); if(res===null) return;
        let correct = (res===targetNumber);
        if(!isQuizActive) {
            if(correct) { showMessage(`✅ 正确！刷新`); refreshGame(true); }
            else showMessage(`❌ 结果=${res}，目标=${targetNumber}`,true);
            return;
        }
        if(totalCompleted >= TOTAL_QUIZ) { finishQuiz(true); return; }
        quizCompleteOne(correct);
    }

    function handleSkipOrRefresh() {
        if(!isQuizActive) { refreshGame(true); showMessage(`🃏 换一组牌`); }
        else { 
            if(totalCompleted < TOTAL_QUIZ) quizCompleteOne(false); 
        }
    }

    function autoFillCard(cardId) {
        const card = cardDataList.find(c=>c.id===cardId);
        if(!card || card.used) { showMessage('这张牌已被使用',true); return false; }
        const emptyIndex = slotsData.findIndex(slot => slot === null);
        if(emptyIndex === -1) { showMessage('算式格已满，请先移除其他卡片',true); return false; }
        slotsData[emptyIndex] = { cardId: card.id, value: card.value };
        card.used = true;
        renderCards();
        renderEquationArea();
        showMessage(`将 ${card.value} 放入第${emptyIndex+1}格`, false);
        return true;
    }

    function removeCardFromSlot(slotIndex) {
        if(slotsData[slotIndex]) {
            const cardId = slotsData[slotIndex].cardId;
            const card = cardDataList.find(c=>c.id===cardId);
            if(card) card.used = false;
            slotsData[slotIndex] = null;
            renderCards();
            renderEquationArea();
            showMessage(`已从算式格移除`, false);
        }
    }

    function removeCardFromAllSlots(cardId) {
        let removed = false;
        for(let i=0;i<slotsData.length;i++) {
            if(slotsData[i] && slotsData[i].cardId === cardId) {
                slotsData[i] = null;
                removed = true;
            }
        }
        if(removed) {
            const card = cardDataList.find(c=>c.id===cardId);
            if(card) card.used = false;
            renderCards();
            renderEquationArea();
            showMessage(`已从算式格移除`, false);
        }
        return removed;
    }

    function selectOperator(idx, op) {
        if(idx >= operators.length) return;
        operators[idx] = op;
        renderOperatorCircles();
        renderEquationArea();
        showMessage(`已选择${op==='+'?'➕':'➖'}`, false);
    }

    function renderOperatorCircles() {
        if(currentDifficulty === 'easy') {
            operatorCirclesDiv.innerHTML = `<div class="op-pair"><div class="op-circle ${operators[0]==='+'?'active':''}" data-opidx="0" data-op="+">➕</div><div class="op-circle ${operators[0]==='-'?'active':''}" data-opidx="0" data-op="-">➖</div></div>`;
        } else {
            operatorCirclesDiv.innerHTML = `<div class="op-pair"><div class="op-circle ${operators[0]==='+'?'active':''}" data-opidx="0" data-op="+">➕</div><div class="op-circle ${operators[0]==='-'?'active':''}" data-opidx="0" data-op="-">➖</div></div><div class="op-pair"><div class="op-circle ${operators[1]==='+'?'active':''}" data-opidx="1" data-op="+">➕</div><div class="op-circle ${operators[1]==='-'?'active':''}" data-opidx="1" data-op="-">➖</div></div>`;
        }
        document.querySelectorAll('.op-circle').forEach(btn => {
            btn.addEventListener('click', (e) => {
                let idx = parseInt(btn.dataset.opidx);
                let op = btn.dataset.op;
                selectOperator(idx, op);
            });
        });
    }

    function renderEquationArea() {
        equationArea.innerHTML = '';
        const container = document.createElement('div');
        container.className = 'slots-container';
        const slotsCount = currentDifficulty==='easy'?2:3;
        for(let i=0;i<slotsCount;i++) {
            const slotDiv = document.createElement('div');
            slotDiv.className = `slot ${slotsData[i] ? 'filled' : ''}`;
            slotDiv.setAttribute('data-slot-index', i);
            const valSpan = document.createElement('div');
            valSpan.className = 'slot-value';
            valSpan.innerText = slotsData[i] ? slotsData[i].value : '?';
            slotDiv.appendChild(valSpan);
            slotDiv.addEventListener('click', (e) => {
                e.stopPropagation();
                if(slotsData[i]) removeCardFromSlot(i);
                else showMessage('此位置没有卡片', true);
            });
            slotDiv.addEventListener('dragover', e=>e.preventDefault());
            slotDiv.addEventListener('drop', (e)=>{
                e.preventDefault();
                const cardId = e.dataTransfer.getData('text/plain');
                if(cardId) {
                    const card = cardDataList.find(c=>c.id===cardId);
                    if(card && !card.used) {
                        if(slotsData[i] !== null) {
                            const oldCard = cardDataList.find(c=>c.id===slotsData[i].cardId);
                            if(oldCard) oldCard.used = false;
                        }
                        slotsData[i] = { cardId: card.id, value: card.value };
                        card.used = true;
                        renderCards(); renderEquationArea();
                    }
                }
            });
            container.appendChild(slotDiv);
            if(i < slotsCount-1) {
                const placeholder = document.createElement('div');
                placeholder.className = 'operator-placeholder';
                const opIndex = (currentDifficulty==='easy') ? 0 : i;
                const selectedOp = operators[opIndex];
                placeholder.innerText = selectedOp === '+' ? '➕' : (selectedOp === '-' ? '➖' : '');
                container.appendChild(placeholder);
            }
        }
        equationArea.appendChild(container);
    }

    function renderCards() {
        cardsArea.innerHTML = '';
        cardDataList.forEach(card => {
            const div = document.createElement('div');
            div.className = `card ${card.used ? 'disabled-card' : ''}`;
            if(!card.used) div.setAttribute('draggable', 'true');
            else div.setAttribute('draggable', 'false');
            div.setAttribute('data-id', card.id);
            const suit = (card.value%4===0?'♥':(card.value%3===0?'♣':(card.value%2===0?'♦':'♠')));
            div.innerHTML = `<div class="card-number">${card.value}</div><div class="card-suit">${suit}</div>`;
            div.addEventListener('dragstart', (e) => {
                if(card.used) { e.preventDefault(); return false; }
                e.dataTransfer.setData('text/plain', card.id);
            });
            div.addEventListener('click', (e) => {
                e.stopPropagation();
                if(card.used) {
                    removeCardFromAllSlots(card.id);
                } else {
                    autoFillCard(card.id);
                }
            });
            cardsArea.appendChild(div);
        });
    }

    function setDifficulty(diff) {
        if(isQuizActive) { showMessage('答题中请结束后切换', true); return; }
        currentDifficulty = diff;
        document.querySelectorAll('.difficulty-btn').forEach(btn=>{
            if(btn.getAttribute('data-diff')===diff) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        if(currentDifficulty==='easy') { slotsData=[null,null]; operators=[null]; }
        else { slotsData=[null,null,null]; operators=[null,null]; }
        refreshGame(true);
        updateLiveRank();
    }

    function startQuizChallengeInternal() {
        if(isQuizActive) return;
        resetQuizSession();
        isQuizActive=true; correctCount=0; totalCompleted=0; updateQuizUI(); startTimer();
        quizPanel.classList.remove('hide'); 
        quizModeBtn.classList.add('disabled-btn'); quizModeBtn.disabled=true; quizModeBtn.textContent='⏳ 答题中';
        refreshGame(true);
        showMessage(`📢 ${currentStudent.name} (${currentStudent.class}) 答题开始！共5题`);
    }
    function resetQuizSession() { if(isQuizActive) finishQuiz(false); isQuizActive=false; correctCount=0; totalCompleted=0; updateQuizUI(); timerDisplay.textContent='0 s'; }
    function openInfoModal() { studentNameInput.value=''; studentClassSelect.value='1'; modalOverlay.classList.add('active'); }
    function closeModal() { modalOverlay.classList.remove('active'); }
    function confirmStudentInfo() { let cls = studentClassSelect.value, name = studentNameInput.value.trim(); if(!name) { alert('请输入姓名'); return; } currentStudent.class=`${cls}班`; currentStudent.name=name; closeModal(); startQuizChallengeInternal(); updateLiveRank(); }
    function onQuizModeClick() { if(isQuizActive) { showMessage('答题进行中请继续或跳过', true); return; } openInfoModal(); }

    function init() {
        isQuizActive=false; quizPanel.classList.add('hide'); 
        quizModeBtn.disabled=false; quizModeBtn.classList.remove('disabled-btn'); quizModeBtn.textContent='🏆 答题模式';
        setDifficulty('easy');
        quizModeBtn.addEventListener('click', onQuizModeClick);
        skipBtn.addEventListener('click', handleSkipOrRefresh);
        practiceSkipBtn.addEventListener('click', handleSkipOrRefresh);
        submitBtn.addEventListener('click', handleVerify);
        document.querySelectorAll('.difficulty-btn').forEach(btn=>btn.addEventListener('click',(e)=>setDifficulty(e.target.getAttribute('data-diff'))));
        modalConfirmBtn.addEventListener('click', confirmStudentInfo);
        modalCancelBtn.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click',(e)=>{ if(e.target===modalOverlay) closeModal(); });
        startLeaderboardRefresh();
    }
    init();
</script>
</body>
</html>
